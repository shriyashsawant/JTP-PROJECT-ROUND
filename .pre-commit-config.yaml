repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^backend/
      - id: end-of-file-fixer
        files: ^backend/
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
        # ruff-format is deliberately not wired in: it would reflow this
        # codebase's existing multi-arg-per-line and aligned-comment style
        # into a much more invasive diff than a tooling change warrants.
        # Enable it separately if/when a full reformat pass is wanted.

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        files: ^backend/app/
        args: ["--config-file=backend/pyproject.toml"]
        additional_dependencies:
          - pydantic==2.10.4
          - pydantic-settings==2.7.1
