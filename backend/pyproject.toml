[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [".venv", "seed_data.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line length handled by formatter/reviewer judgment, not a hard gate
    "B008",   # FastAPI's Depends(...) as a default arg is the framework's own idiom
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]  # fixtures imported for their side effects/pytest discovery

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
exclude = ["seed_data.py", "tests/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
